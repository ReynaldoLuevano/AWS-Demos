          def send_response(event, context, status, reason=""):
              body = json.dumps({"Status": status, "Reason": reason,
                                 "PhysicalResourceId": "seed-data",
                                 "StackId": event["StackId"],
                                 "RequestId": event["RequestId"],
                                 "LogicalResourceId": event["LogicalResourceId"]})
              req = urllib.request.Request(event["ResponseURL"],
                                           data=body.encode(),
                                           headers={"Content-Type": ""},
                                           method="PUT")
              urllib.request.urlopen(req)

          def handler(event, context):
              if event["RequestType"] == "Delete":
                  send_response(event, context, "SUCCESS")
                  return
              try:
                  table = dynamodb.Table(os.environ["TABLE_NAME"])
                  from decimal import Decimal
                  with table.batch_writer() as batch:
                      for c in COURSES:
                          item = {k: Decimal(str(v)) if isinstance(v, float) else v
                                  for k, v in c.items()}
                          batch.put_item(Item=item)
                  send_response(event, context, "SUCCESS")
              except Exception as e:
                  send_response(event, context, "FAILED", str(e))

  SeedDataTrigger:
    Type: Custom::SeedData
    DependsOn: CoursesTable
    Properties:
      ServiceToken: !GetAtt SeedDataFunction.Arn

  # -----------------------------------------------------------
  # IAM ROLE – Compartido por las tres funciones Lambda
  # -----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "courses-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBCourseAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt CoursesTable.Arn
                  - !Sub "${CoursesTable.Arn}/index/*"

  # -----------------------------------------------------------
  # LAMBDA 1 – getCourses
  # -----------------------------------------------------------
  GetCoursesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "getCourses-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref CoursesTable
          GSI_NAME: category-index
      Description: >
        Obtiene cursos de DynamoDB.
        Soporta: listar todos, filtrar por categoría, buscar por courseId.
      Code:
        ZipFile: |
          import boto3, os, json
          from decimal import Decimal
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table    = dynamodb.Table(os.environ['TABLE_NAME'])
          GSI      = os.environ['GSI_NAME']

          def decimal_to_native(obj):
              """Convierte Decimal a int o float para serialización JSON."""
              if isinstance(obj, Decimal):
                  return int(obj) if obj % 1 == 0 else float(obj)
              raise TypeError

          def response(status_code, body):
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Content-Type": "application/json",
                      "Access-Control-Allow-Origin": "*"
                  },
                  "body": json.dumps(body, default=decimal_to_native)
              }

          def handler(event, context):
              """
              Modos de uso (queryStringParameters):
                Sin parámetros          → devuelve todos los cursos (Scan)
                ?category=cloud         → cursos de esa categoría (GSI Query)
                ?courseId=AWS-001&category=cloud → curso específico (GetItem)
                ?active=true            → solo cursos activos
              """
              params = event.get("queryStringParameters") or {}
              category  = params.get("category")
              course_id = params.get("courseId")
              only_active = params.get("active", "").lower() == "true"

              try:
                  # -- Caso 1: GetItem por clave compuesta -----------------
                  if course_id and category:
                      result = table.get_item(
                          Key={"courseId": course_id, "category": category}
                      )
                      item = result.get("Item")
                      if not item:
                          return response(404, {"message": "Curso no encontrado"})
                      return response(200, {"course": item})

                  # -- Caso 2: Query por categoría (GSI) -------------------
                  if category:
                      result = table.query(
                          IndexName=GSI,
                          KeyConditionExpression=Key("category").eq(category)
                      )
                      items = result.get("Items", [])
                      if only_active:
                          items = [c for c in items if c.get("active") is True]
                      return response(200, {
                          "category": category,
                          "count": len(items),
                          "courses": items
                      })

                  # -- Caso 3: Scan completo --------------------------------
                  result = table.scan()
                  items = result.get("Items", [])
                  if only_active:
                      items = [c for c in items if c.get("active") is True]
                  return response(200, {
                      "count": len(items),
                      "courses": items
                  })

              except Exception as e:
                  return response(500, {"message": "Error interno", "detail": str(e)})

  # -----------------------------------------------------------
  # LAMBDA 2 – insertCourse
  # -----------------------------------------------------------
  InsertCourseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "insertCourse-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref CoursesTable
      Description: >
        Inserta o actualiza un curso en DynamoDB.
        El cuerpo del evento debe incluir courseId y category como mínimo.
      Code:
        ZipFile: |
          import boto3, os, json
          from decimal import Decimal
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          table    = dynamodb.Table(os.environ['TABLE_NAME'])

          # Campos obligatorios
          REQUIRED = {"courseId", "category", "title", "level", "durationHours", "price"}

          # Valores válidos
          VALID_LEVELS     = {"beginner", "intermediate", "advanced"}
          VALID_CATEGORIES = {"cloud", "ia", "devops", "security", "data"}

          def float_to_decimal(obj):
              """Convierte floats a Decimal para DynamoDB."""
              if isinstance(obj, float):
                  return Decimal(str(obj))
              if isinstance(obj, dict):
                  return {k: float_to_decimal(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [float_to_decimal(i) for i in obj]
              return obj

          def response(status_code, body):
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Content-Type": "application/json",
                      "Access-Control-Allow-Origin": "*"
                  },
                  "body": json.dumps(body)
              }

          def handler(event, context):
              """
              Inserta un nuevo curso o actualiza uno existente (upsert).

              Ejemplo de evento de prueba:
              {
                "body": "{\"courseId\":\"AWS-010\",\"category\":\"cloud\",
                          \"title\":\"AWS Advanced Networking\",
                          \"provider\":\"Amazon Web Services\",
                          \"level\":\"advanced\",\"durationHours\":45,
                          \"price\":329.00,\"currency\":\"EUR\",\"language\":\"es\",
                          \"tags\":[\"aws\",\"networking\",\"vpc\",\"direct-connect\"],
                          \"description\":\"Diseño de redes avanzadas en AWS.\",
                          \"rating\":0.0,\"enrollments\":0,\"active\":true}"
              }
              """
              # -- Parsear body -------------------------------------------
              try:
                  raw_body = event.get("body") or event
                  if isinstance(raw_body, str):
                      body = json.loads(raw_body)
                  elif isinstance(raw_body, dict):
                      body = raw_body
                  else:
                      return response(400, {"message": "Body inválido"})
              except json.JSONDecodeError as e:
                  return response(400, {"message": f"JSON malformado: {e}"})

              # -- Validar campos obligatorios ----------------------------
              missing = REQUIRED - body.keys()
              if missing:
                  return response(400, {
                      "message": "Faltan campos obligatorios",
                      "missing": list(missing)
                  })

              # -- Validar valores ----------------------------------------
              if body["level"] not in VALID_LEVELS:
                  return response(400, {
                      "message": f"level inválido. Valores permitidos: {VALID_LEVELS}"
                  })
              if body["category"] not in VALID_CATEGORIES:
                  return response(400, {
                      "message": f"category inválida. Valores permitidos: {VALID_CATEGORIES}"
                  })
              if not isinstance(body["durationHours"], (int, float)) or body["durationHours"] <= 0:
                  return response(400, {"message": "durationHours debe ser un número positivo"})
              if not isinstance(body["price"], (int, float)) or body["price"] < 0:
                  return response(400, {"message": "price debe ser un número no negativo"})

              # -- Enriquecer el item ------------------------------------
              body["createdAt"] = datetime.now(timezone.utc).isoformat()
              body.setdefault("active", True)
              body.setdefault("currency", "EUR")
              body.setdefault("language", "es")
              body.setdefault("rating", 0.0)
              body.setdefault("enrollments", 0)
              body.setdefault("tags", [])

              # -- Guardar en DynamoDB -----------------------------------
              try:
                  item = float_to_decimal(body)
                  table.put_item(Item=item)
                  return response(201, {
                      "message": "Curso insertado correctamente",
                      "courseId": body["courseId"],
                      "category": body["category"]
                  })
              except Exception as e:
                  return response(500, {"message": "Error al guardar", "detail": str(e)})

# =============================================================
# OUTPUTS
# =============================================================
Outputs:
  TableName:
    Description: Nombre de la tabla DynamoDB
    Value: !Ref CoursesTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: ARN de la tabla DynamoDB
    Value: !GetAtt CoursesTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  GetCoursesFunctionArn:
    Description: ARN de la función getCourses
    Value: !GetAtt GetCoursesFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GetCoursesArn"

  InsertCourseFunctionArn:
    Description: ARN de la función insertCourse
    Value: !GetAtt InsertCourseFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-InsertCourseArn"

  LambdaRoleArn:
    Description: ARN del rol IAM compartido
    Value: !GetAtt LambdaExecutionRole.Arn
