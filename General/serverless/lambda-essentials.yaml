AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Academia Cloud & IA – Catálogo de cursos.
  Incluye tabla DynamoDB con datos de ejemplo, función getCourses e insertCourse.

# =============================================================
# PARÁMETROS
# =============================================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Entorno de despliegue

# =============================================================
# RECURSOS
# =============================================================
Resources:

  # -----------------------------------------------------------
  # DYNAMODB – Tabla de cursos
  # -----------------------------------------------------------
  CoursesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "courses-${Environment}"
      BillingMode: PAY_PER_REQUEST
      # Partition Key: courseId  (ej: "AWS-001")
      # Sort Key    : category   (ej: "cloud" | "ia" | "devops")
      # Con este esquema podemos consultar todos los cursos de
      # una categoría de forma eficiente con Query.
      AttributeDefinitions:
        - AttributeName: courseId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: courseId
          KeyType: HASH       # Partition Key
        - AttributeName: category
          KeyType: RANGE      # Sort Key
      # GSI para listar cursos por categoría sin conocer el courseId
      GlobalSecondaryIndexes:
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: courseId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: AcademiaCloudIA
        - Key: Environment
          Value: !Ref Environment

