                  action_response = {
                      'actionGroup': actionGroup,
                      'apiPath': apiPath,
                      'httpMethod': httpMethod,
                      'httpStatusCode': 400,
                      'responseBody': responseBody
                  }
                  return {'response': action_response, 'messageVersion': event['messageVersion']}

              # Scan the table to get all items for the user
              response = cart_table.scan(
                  FilterExpression=boto3.dynamodb.conditions.Key('user_id').eq(user_id)
              )

              items = response.get('Items', [])
              cart_items = [{'product_name': item['product_name']} for item in items]

              responseBody = {
                  "application/json": {
                      "body": json.dumps(cart_items)
                  }
              }
              action_response = {
                  'actionGroup': actionGroup,
                  'apiPath': apiPath,
                  'httpMethod': httpMethod,
                  'httpStatusCode': 200,
                  'responseBody': responseBody
              }
              return {'response': action_response, 'messageVersion': event['messageVersion']}

      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn

  Fninvoke:
    Type: AWS::CloudFormation::CustomResource
    Version: "1.0"
    Properties:
      ServiceToken: !GetAtt PopulateProductsTableFunction.Arn

  ClaudeLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAndMarketplaceAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
                - "bedrock:GetInferenceProfile"
                - "bedrock:GetFoundationModel"
                Resource: 
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              - Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                Resource: '*'

    # Lambda function to call Claude Sonnet 4.5 and 3.7
  ClaudeLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ClaudeLambdaExecutionRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          
          bedrock = boto3.client('bedrock-runtime')
          
          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  prompt = "Hi"
                  
                  responses = []
                  
                  # Call Claude Haiku 4.5 via US inference profile
                  response = bedrock.invoke_model(
                      modelId='us.anthropic.claude-haiku-4-5-20251001-v1:0',
                      body=json.dumps({
                          'anthropic_version': 'bedrock-2023-05-31',
                          'max_tokens': 50,
                          'messages': [{'role': 'user', 'content': prompt}]
                      })
                  )
                  
                  result = json.loads(response['body'].read())
                  responses.append({
                      'model': 'claude-haiku-4-5-us',
                      'status': 'success'
                  })
                  
                
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'ClaudeResponses': json.dumps(responses)
                  })
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})


  # Custom resource that triggers the Lambda function
  ClaudeCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ClaudeLambdaFunction.Arn


Outputs:
  ProductsTableName:
    Description: The name of the DynamoDB table
    Value: !Ref Products
    Export:
      Name: ProductsTableName
  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt ClaudeLambdaFunction.Arn
  ClaudeResponses:
    Description: 'Responses from Claude Haiku 4.5'
    Value: !GetAtt ClaudeCustomResource.ClaudeResponses